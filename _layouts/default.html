<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* ==== Dark theme palette (tweak these) ==== */
    :root {
      --maxw: 800px;
      --bg: #0f1713;          /* dark greenish-gray background */
      --fg: #e6ebe8;          /* main text (light) */
      --fg-muted: #a7b1ab;    /* muted text */
      --link: #8fd3a8;        /* link color (soft mint) */
      --link-hover: #b9e7c9;  /* link hover (brighter mint) */
      --border: rgba(255,255,255,.12); /* subtle borders */
      --card: rgba(255,255,255,.04);   /* optional surface */
      --focus: 0 0 0 3px rgba(143,211,168,.45); /* focus ring */
    }

    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
    body {
      font-family: {{ page.font_family | default: site.font_family | default: "Arial, Helvetica, sans-serif" }};
      line-height: 1.6;
    }

    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 24px 16px; text-align: left; }

    a {
      color: var(--link);
      text-decoration: none;
      outline: none;
    }
    a:hover { color: var(--link-hover); text-decoration: underline; }
    a:focus-visible { box-shadow: var(--focus); border-radius: 4px; }

    .muted { color: var(--fg-muted); font-size: .95em; }
    .post-link { display: block; padding: 6px 0; }
    .nav-prev-next { margin-top: 40px; display: flex; justify-content: space-between; }

    hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
    h1,h2,h3 { margin: 0.6em 0 0.4em; }

    /* Optional: give code blocks or pre tags a subtle surface if you use them */
    pre, code { background: var(--card); }
    pre { padding: 12px; border-radius: 8px; overflow: auto; }
    code { padding: 2px 6px; border-radius: 6px; }

    /* Images look sharp on dark backgrounds */
    img { max-width: 100%; height: auto; border-radius: 6px; }

    /* Buttons/inputs (only if you add them later) */
    button, input, select, textarea {
      background: var(--card);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    button:hover { filter: brightness(1.1); }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: none; box-shadow: var(--focus);
    }
  </style>
</head>
<body>
  <main class="wrap">
    {{ content }}
  </main>

  <footer class="wrap muted">
    <hr>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
      <span>© {{ "now" | date: "%Y" }} {{ site.title }}</span>
      <span aria-hidden="true">·</span>
      <span>For educational and entertainment purposes only. Not investment or gambling advice.</span>
      <span aria-hidden="true">·</span>
      <a href="{{ '/disclaimer/' | relative_url }}">Disclaimer &amp; Terms</a>
    </div>
  </footer>
</body>
</html>
