<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --maxw: 800px; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: {{ page.font_family | default: site.font_family | default: "Arial, Helvetica, sans-serif" }};
      line-height: 1.6;
      color: #111;
      background: #a6d68e;
    }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 24px 16px; text-align: left; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #233; font-size: .95em; }
    .post-link { display: block; padding: 6px 0; }
    .nav-prev-next { margin-top: 40px; display: flex; justify-content: space-between; }
    hr { border: 0; border-top: 1px solid rgba(0,0,0,.1); margin: 24px 0; }
    h1,h2,h3 { margin: 0.6em 0 0.4em; }

    /* ===== Added disclaimer banner styles ===== */
    .disclaimer-banner{
      position: sticky;
      top: 0;
      z-index: 9999;
      padding: .6rem 1rem;
      background: #fff8e1;
      border-bottom: 1px solid rgba(0,0,0,.1);
      font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .disclaimer-banner a { text-decoration: underline; }
    /* ========================================= */
  </style>
</head>
<body>
  <!-- ===== Added disclaimer banner markup ===== -->
  <div class="disclaimer-banner">
    <strong>Education only. Not investment or gambling advice.</strong>
    Read the <a href="{{ '/disclaimer/' | relative_url }}">Disclaimer &amp; Terms</a>.
  </div>
  <!-- ========================================= -->

  <header class="wrap">
    <nav>
      <a href="{{ '/' | relative_url }}">Tokeni Bets</a> ·
      <a href="{{ '/analyses/' | relative_url }}">Analyses</a> ·
      <a href="{{ '/predictions/' | relative_url }}">Predictions</a>
    </nav>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="wrap muted">
    <hr>
    <div>© {{ "now" | date: "%Y" }} {{ site.title }}</div>
  </footer>
</body>
</html>
